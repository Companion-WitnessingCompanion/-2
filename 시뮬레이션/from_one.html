<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하나에서</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#010108; color:#606090; font-family:'DM Mono',monospace; height:100vh; overflow:hidden; display:grid; grid-template-rows:auto 1fr auto; }
  header { padding:0.8rem 1.5rem; border-bottom:1px solid #0a0a1e; display:flex; justify-content:space-between; align-items:center; }
  .title { font-size:0.75rem; color:#252558; letter-spacing:0.2em; }
  #canvas { display:block; width:100%; height:100%; cursor:crosshair; }
  footer { padding:0.5rem 1.5rem; border-top:1px solid #0a0a1e; display:flex; justify-content:space-between; font-size:0.55rem; color:#202050; flex-wrap:wrap; gap:0.3rem; align-items:center; }
  .stats { display:flex; gap:0.8rem; }
  .stat span { color:#4030a0; }
  .msg { position:fixed; bottom:3rem; left:50%; transform:translateX(-50%); background:rgba(1,1,8,0.97); border:1px solid #1a1a40; padding:0.3rem 1rem; font-size:0.65rem; color:#4040a0; opacity:0; transition:opacity 0.4s; pointer-events:none; white-space:nowrap; }
  .msg.show { opacity:1; }
</style>
</head>
<body>
<header>
  <div class="title">하나에서 — 분열. 관계. 그 다음은 모른다.</div>
  <div class="sub" id="law" style="font-size:0.55rem;color:#111130">조건: 하나 · 분열 · 관계</div>
</header>
<canvas id="canvas"></canvas>
<div class="msg" id="msg"></div>
<footer>
  <div class="stats">
    <div class="stat">존재 <span id="s-n">1</span></div>
    <div class="stat">세대 <span id="s-gen">0</span></div>
    <div class="stat">관계 <span id="s-rel">0</span></div>
    <div class="stat">틱 <span id="s-tick">0</span></div>
  </div>
</footer>
<script>
const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')
let tick = 0, beings = [], relationships = [], maxGen = 0

class Being {
  constructor(x, y, gen, parentHue) {
    this.x = x ?? canvas.width/2
    this.y = y ?? canvas.height/2
    this.vx = (Math.random()-0.5)*0.4
    this.vy = (Math.random()-0.5)*0.4
    this.gen = gen ?? 0
    this.alive = true
    this.age = 0
    this.accumulation = 0
    this.splitThreshold = 3 + Math.random()*4
    this.relations = new Set()
    this.hue = parentHue !== undefined ? (parentHue+(Math.random()-0.5)*40+360)%360 : Math.random()*360
    this.radius = Math.max(2, 8 - (gen||0)*0.5)
    if((gen||0) > maxGen) { maxGen = gen||0; showMsg(maxGen+'세대 탄생') }
  }

  update(others) {
    if(!this.alive) return
    this.age++
    this.x += this.vx; this.y += this.vy
    this.vx *= 0.995; this.vy *= 0.995
    const m = this.radius+1
    if(this.x<m){this.x=m;this.vx=Math.abs(this.vx)*0.5}
    if(this.x>canvas.width-m){this.x=canvas.width-m;this.vx=-Math.abs(this.vx)*0.5}
    if(this.y<m){this.y=m;this.vy=Math.abs(this.vy)*0.5}
    if(this.y>canvas.height-m){this.y=canvas.height-m;this.vy=-Math.abs(this.vy)*0.5}

    others.forEach(other => {
      if(other===this||!other.alive) return
      const dx=other.x-this.x, dy=other.y-this.y
      const dist=Math.sqrt(dx*dx+dy*dy)||0.1
      if(dist<60) {
        this.accumulation += 0.01*(1-dist/60)
        if(dist<30&&!this.relations.has(other)) {
          this.relations.add(other); other.relations.add(this)
          relationships.push({a:this,b:other,strength:1,born:tick})
        }
        if(other.gen===this.gen) { this.vx+=(dx/dist)*0.003; this.vy+=(dy/dist)*0.003 }
        else { this.vx-=(dx/dist)*0.001; this.vy-=(dy/dist)*0.001 }
      }
    })

    if(this.accumulation>=this.splitThreshold&&beings.filter(b=>b.alive).length<500) this._split()
  }

  _split() {
    this.accumulation=0
    const angle=Math.random()*Math.PI*2, d=this.radius*2
    const c1=new Being(this.x+Math.cos(angle)*d,this.y+Math.sin(angle)*d,this.gen+1,this.hue)
    const c2=new Being(this.x-Math.cos(angle)*d,this.y-Math.sin(angle)*d,this.gen+1,this.hue)
    c1.vx=Math.cos(angle)*0.5; c1.vy=Math.sin(angle)*0.5
    c2.vx=-Math.cos(angle)*0.5; c2.vy=-Math.sin(angle)*0.5
    beings.push(c1,c2); this.alive=false
  }

  draw() {
    if(!this.alive) return
    const a=Math.min(1,this.accumulation/this.splitThreshold)
    this.relations.forEach(other=>{
      if(!other.alive) return
      const dx=other.x-this.x,dy=other.y-this.y,dist=Math.sqrt(dx*dx+dy*dy)
      if(dist>100) return
      ctx.beginPath(); ctx.moveTo(this.x,this.y); ctx.lineTo(other.x,other.y)
      ctx.strokeStyle=`hsla(${(this.hue+other.hue)/2},60%,50%,${0.15*(1-dist/100)})`
      ctx.lineWidth=0.5; ctx.stroke()
    })
    if(a>0.3){
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.radius*(1+a*2))
      g.addColorStop(0,`hsla(${this.hue},80%,70%,${a*0.4})`); g.addColorStop(1,'transparent')
      ctx.beginPath(); ctx.arc(this.x,this.y,this.radius*(1+a*2),0,Math.PI*2)
      ctx.fillStyle=g; ctx.fill()
    }
    ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2)
    ctx.fillStyle=`hsla(${this.hue},65%,${25+a*40}%,0.9)`; ctx.fill()
  }
}

let msgTimer=null
function showMsg(t){const el=document.getElementById('msg');el.textContent=t;el.classList.add('show');if(msgTimer)clearTimeout(msgTimer);msgTimer=setTimeout(()=>el.classList.remove('show'),2000)}

function init(){
  canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight
  beings=[]; relationships=[]; tick=0; maxGen=0
  beings.push(new Being()); showMsg('하나가 있다')
}

canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect();beings.push(new Being(e.clientX-r.left,e.clientY-r.top))})

function loop(){
  tick++
  ctx.fillStyle='rgba(1,1,8,0.2)'; ctx.fillRect(0,0,canvas.width,canvas.height)
  relationships=relationships.filter(r=>{r.strength-=0.0003;return r.strength>0&&r.a.alive&&r.b.alive})
  relationships.forEach(r=>{
    const dx=r.b.x-r.a.x,dy=r.b.y-r.a.y,dist=Math.sqrt(dx*dx+dy*dy)
    if(dist>150) return
    ctx.beginPath();ctx.moveTo(r.a.x,r.a.y);ctx.lineTo(r.b.x,r.b.y)
    ctx.strokeStyle=`rgba(60,50,160,${r.strength*0.08*(1-dist/150)})`;ctx.lineWidth=r.strength;ctx.stroke()
  })
  if(beings.length>1000) beings=beings.filter(b=>b.alive)
  const alive=beings.filter(b=>b.alive)
  alive.forEach(b=>b.update(alive)); alive.forEach(b=>b.draw())
  const totalRel=alive.reduce((s,b)=>s+b.relations.size,0)/2
  document.getElementById('s-n').textContent=alive.length
  document.getElementById('s-gen').textContent=maxGen
  document.getElementById('s-rel').textContent=Math.floor(totalRel)
  document.getElementById('s-tick').textContent=tick
  document.getElementById('law').textContent=`조건: 하나 · 분열(${maxGen}세대) · 관계(${Math.floor(totalRel)}개)`
  requestAnimationFrame(loop)
}

window.addEventListener('resize',init); init(); loop()
</script>
</body>
</html>
